server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name  d.vmess.com;

	error_log    /var/log/nginx.error.log    error;

	ssl_certificate		/etc/nginx/conf.d/vmess.com.crt;    #ssl证书的key文件路径
	ssl_certificate_key	/etc/nginx/conf.d/vmess.com.key;
	ssl_session_timeout 5m;

	client_max_body_size 50m; 
	client_body_buffer_size 256k;
	client_header_timeout 3m;
	client_body_timeout 3m;

	send_timeout 3m;
	proxy_connect_timeout 300s; 
	proxy_read_timeout 300s; 
	proxy_send_timeout 300s;
	proxy_ignore_client_abort on; 

	if ($args = "tvbox") {
		return 302 https://$host/tvbox.json;
		# index	tvbox.json;	# 默认首页
		# root /mnt/sda3/tvbox/test.json;
	}

	if ($args = "pluto") {
		return 302 https://$host/test.json;
		# index	tvbox.json;	# 默认首页
		# root /mnt/sda3/tvbox/test.json;
	}

	# if ( $request_uri = "/?tvbox" ){
		# root	/tmp;		# 静态页面目录
		# index	tvbox.json;	# 默认首页
		# return 302 https://w.$host$request_uri#13;
		# proxy_pass http://$host$request_uri; # $host客户端访问服务端的IP地址
	# }
	# return 302 http://www.$host$request_uri#123; # $host客户端访问服务端的IP地址 

	# location ~* \/?(tvbox|crbox)$ {
	# location = \/?tvbox$ {
	# location ~* \?tvbox {
	# $request_uri ~* \/?(tvbox|crbox)$ {
	# location /?tvbox {
	# location ~* \?tvbox {
	location ~* ^/?method=autoGenerateIndex {
		default_type text/html;	# 设置content type
		# HTTP Status Code 和 内容 if ($query_string ~ ".*(?:^|\?|&)method=autoGenerateIndex(?:(?:&.*)|$)") { 
		if ($query_string ~ ".*(?:^|\?|&)?tvbox(?:(?:&.*)|$)") { 
			return 200  "Good job!"; 
		}
		return 200  "I'm sure it'll work out.";
	}

	location ~* ^/?tvbox2 {
		# default_type text/html;	# 设置content type
		# HTTP Status Code 和 内容 if ($query_string ~ ".*(?:^|\?|&)method=autoGenerateIndex(?:(?:&.*)|$)") { 
		if ($query_string ~ ".*(?:^|\?|&)tvbox(?:(?:&.*)|$)") { 
			# return 200  "Good job!"; 
			root	/mnt/sda3/tvbox;		# 静态页面目录
		}
		index	tvbox.json;	# 默认首页
		# return 200  "I'm sure it'll work out.";
		alias /mnt/sda3/tvbox/tvbox.json;
	}

	location ~* ploto2 {
		alias /mnt/sda3/tvbox/test.json;
	}

