server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name api.vmess.com;
	keepalive_timeout   1200s;

	ssl_certificate      /etc/nginx/conf.d/vmess.com.crt;
	ssl_certificate_key  /etc/nginx/conf.d/vmess.com.key;
	ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
	# ssl_ciphers         HIGH:!aNULL:!MD5;
	# ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
	ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers on;	#  服务器密码优先客户端密码 默认值 off
	ssl_session_timeout 10m;
	# ssl_session_cache builtin:1000 shared:SSL:10m;
	ssl_buffer_size 1400;
	ssl_stapling on;
	ssl_stapling_verify on;

	# 这里的跳转，如果不是要反代ssl网站就不用了
	if ( $scheme = http ){
		return 301 https://$server_name$request_uri;
	}

	# 屏蔽蜘蛛，防止降权，反代别人的网站。。。就随便了  
	if ($http_user_agent ~* (baiduspider|360spider|haosouspider|googlebot|soso|bing|sogou|yahoo|sohu-search|yodao|YoudaoBot|robozilla|msnbot|MJ12bot|NHN|Twiceler)) {
		return  403;
	}

	proxy_set_header Cookie $http_cookie;
	# 反代规则设置
	location / {
		sub_filter api.vmess.com api.nn.ci;			# 网站域名，反代域名
		sub_filter "title=\"复制\" data-copy=\"" "title=\"复制\" data-copy=\"https://bipfs.dns.army/ipfs/";
		sub_filter /profileEdit /;								# 关闭个人资料修改页面
		# sub_filter window.location.replace api.vmess.com;	# 网站域名，反代域名
		sub_filter_once off;	# 进行替换


		# 添加网页响应标头
 		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
 		add_header Access-Control-Allow-Origin *;
		add_header Access-Control-Allow-Headers *;
		add_header Access-Control-Allow-Methods "GET, POST, PUT, OPTIONS";

		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;	# 向后端传递访客ip
		proxy_set_header Referer https://api.nn.ci/alist/ali_open/token;				# 强制定义Referer
		proxy_set_header Host api.nn.ci;								# 定义主机 proxy_set_header Host $http_host;  或 $proxy_host 或 域名zh.singlelogin.re
		proxy_set_header Accept-Encoding "";				# 重要将信息传递到服务器端


		proxy_http_version 1.1;
		proxy_pass https://api.nn.ci;		# 这种写法，这里就必须得是https

		proxy_redirect off;

		proxy_ssl_server_name on;
		proxy_ssl_name api.nn.ci;
		proxy_ssl_session_reuse off;
	}

	# 拦截websocket请求
	location /websocket {
		proxy_pass https://zh.singlelogin.re;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
	}


	access_log	/var/log/nginx.access.log	main;
	error_log	/var/log/nginx.error.log	error;

}

