	# root /chanchan.site/webroot；
	location ~ /purge(/.*) {
		# proxy_cache_purge cache_one $1$is_args$args;
		allow 127.0.0.1;
		allow 172.16.10.0/24;
		deny all;
	}

	# 在响应头中添加两个标识，用来测试
	add_header X-Via $server_addr;				
	add_header X-Cache $upstream_cache_status;	
    
	location / {
		# 声明一个控制变量，做到类似else效果
		set $switchVarible 0;
		if ($query_string ~ ".*(?:^|\?|&)tvbox(?:(?:&.*)|$)") { 
			# return 200  "Good job!"; 
			root	/mnt/sda3/tvbox;		# 静态页面目录
      		set $switchVarible 1;
		}
		if ($switchVarible != 1) {
			# set $cors_origin '*';
 		}

		# sub_filter 'ipns/k2k4r8kms1l1k3wljk4o8eopnb2dltfvh8pypr0zkeyjunyagft3aqvs' 'tvbox';
		proxy_cache cache_one;				# 缓存区名称
		proxy_cache_key $uri$is_args$args;	# 设置hash的key值组成规则
		# 对不同的HTTP状态码设置不同的缓存时间 （d 天 m 分钟 h 小时）
		proxy_cache_valid 200 12h;
		proxy_cache_valid 304 12h;
		proxy_cache_valid 301 302 1d;
		proxy_cache_valid any 10m;
		# 后面为做处理的都被转到代理服务器上面
		proxy_pass http://blance-ipfs-node/ipns/k2k4r8kms1l1k3wljk4o8eopnb2dltfvh8pypr0zkeyjunyagft3aqvs/tvbox/;
		# proxy_redirect ~^http://blance-ipfs-node/ipns/k2k4r8kms1l1k3wljk4o8eopnb2dltfvh8pypr0zkeyjunyagft3aqvs(.*)   http://d.vmess.com/tvbox$1;

		proxy_set_header Host $host:$server_port;	# $http_host
		proxy_set_header Remote_Addr $remote_addr;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Scheme $scheme;
		proxy_set_header X-Forwarded-Scheme $scheme;
		proxy_set_header X-Forwarded-Proto $scheme;

		expires 1d;
	}
      
	location /ipns/k2k4r8kms1l1k3wljk4o8eopnb2dltfvh8pypr0zkeyjunyagft3aqvs/tvbox/ {
		proxy_cache cache_one;				# 缓存区名称
		proxy_cache_key $uri$is_args$args;	# 设置hash的key值组成规则
		# 对不同的HTTP状态码设置不同的缓存时间 （d 天 m 分钟 h 小时）
		proxy_cache_valid 200 12h;
		proxy_cache_valid 304 12h;
		proxy_cache_valid 301 302 1d;
		proxy_cache_valid any 10m;


		rewrite ^/ipns/k2k4r8kms1l1k3wljk4o8eopnb2dltfvh8pypr0zkeyjunyagft3aqvs/tvbox/(.*)$ /$1 break;

		# 后面为做处理的都被转到代理服务器上面
